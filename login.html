<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h1>Benutzeranmeldung</h1>

    <form action="#" method="post">
        <label>Benutzername:</label>
        <input type="text" name="username"><br><br>

        <label>Passwort:</label>
        <input type="password" name="password"><br><br>

        <button type="button" onclick="window.location.href='registration.html'">Registrieren</button>
        <button type="button" onclick="window.location.href='user.html'">Anmelden</button>
        <button type="button" onclick="window.location.href='index.html'">Zur Startseite</button>
        
    </form>
</body>
</html>
